on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref_name }}
      - name: List files in workspaces
        run: ls ${{ github.workspace }}
